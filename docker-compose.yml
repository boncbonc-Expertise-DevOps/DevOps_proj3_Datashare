services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER:-demo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-demo}
      POSTGRES_DB: ${DB_NAME:-datashare_db_demo}
    ports:
      - "${DB_PORT_HOST:-5432}:5432"
    volumes:
      - datashare_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 3s
      retries: 30

  backend:
    build:
      context: ./backend
    environment:
      PORT: "3000"

      # DB (dans le réseau docker, le host est le nom de service)
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-demo}
      DB_PASSWORD: ${DB_PASSWORD:-demo}
      DB_NAME: ${DB_NAME:-datashare_db_demo}

      # Auth
      JWT_SECRET: ${JWT_SECRET:-ChangeMeForDemo}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-3600s}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Persiste les fichiers uploadés
      - datashare_uploads:/app/uploads

volumes:
  datashare_db:
  datashare_uploads:
